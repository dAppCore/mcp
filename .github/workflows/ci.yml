name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

env:
  GOFLAGS: -buildvcs=false
  GOWORK: "off"
  GOPROXY: "direct"
  GOSUMDB: "off"

jobs:
  test:
    name: Test + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Test with coverage
        working-directory: go
        run: go test -race -coverprofile=coverage.out -covermode=atomic -count=1 ./...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: go/coverage.out
          flags: unittests
          fail_ci_if_error: false

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          working-directory: go
          args: --timeout=5m --tests=false

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Test for coverage
        working-directory: go
        run: go test -coverprofile=coverage.out -covermode=atomic -count=1 ./...
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=dappcore
            -Dsonar.projectKey=dappcore_mcp
            -Dsonar.sources=go
            -Dsonar.exclusions=**/vendor/**,**/third_party/**,**/.tmp/**,**/*_test.go
            -Dsonar.tests=go
            -Dsonar.test.inclusions=**/*_test.go
            -Dsonar.go.coverage.reportPaths=go/coverage.out
